<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MskDSP Upper</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #1e1e1e;
      }

      body {
        overflow: hidden;
        color-scheme: dark;
        font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background:
          radial-gradient(circle at top, rgba(0, 122, 204, 0.22), transparent 42%),
          #1e1e1e;
        color: #d7dde5;
        z-index: 9999;
        transition: opacity 160ms ease;
      }

      #boot-splash.boot-splash--hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-splash__spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #007acc;
        animation: boot-spin 0.9s linear infinite;
      }

      .boot-splash__title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .boot-splash__desc {
        font-size: 13px;
        color: #9aa4af;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash__spinner"></div>
      <div class="boot-splash__title">MskDSP Upper</div>
      <div class="boot-splash__desc">正在加载控制台…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
