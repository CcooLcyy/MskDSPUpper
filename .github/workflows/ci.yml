name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  RUST_TARGET: x86_64-pc-windows-msvc
  PLATFORM_ID: windows-x64
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: 'true'
  SCCACHE_GHA_VERSION: mskdsp-upper-windows-msvc-v1
  CARGO_INCREMENTAL: '0'
  PACKAGE_DIR: package
  STATIC_UPDATE_BASE_URL: ${{ vars.UPDATE_STATIC_BASE_URL || 'https://update.clsclear.top/mskdsp-upper' }}
  STATIC_UPDATE_REMOTE_ROOT: ${{ vars.UPDATE_STATIC_REMOTE_ROOT || '/home/daniel/update-server/www/mskdsp-upper' }}
  STATIC_UPDATE_SSH_HOST: ${{ vars.UPDATE_STATIC_SSH_HOST || 'clsclear.top' }}
  STATIC_UPDATE_SSH_PORT: ${{ vars.UPDATE_STATIC_SSH_PORT || '32118' }}
  STATIC_UPDATE_SSH_USER: ${{ vars.UPDATE_STATIC_SSH_USER || 'daniel' }}

jobs:
  verify-debug:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGET }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: mskdsp-upper-${{ runner.os }}-${{ env.RUST_TARGET }}
          workspaces: |
            ./src-tauri -> target
          cache-bin: 'false'

      - name: Prepare package/log directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package\logs -Force | Out-Null

      - name: Prepare submodule access
        shell: pwsh
        env:
          SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_TOKEN }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: .\scripts\workflow\Prepare-SubmoduleAccess.ps1

      - name: Sync and update submodules
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule status | Tee-Object -FilePath package\logs\git-submodule-status.log

      - name: Install Node dependencies
        shell: pwsh
        run: |
          npm ci 2>&1 | Tee-Object -FilePath package\logs\npm-ci.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run workflow helper tests
        shell: pwsh
        run: |
          npm run test:workflow 2>&1 | Tee-Object -FilePath package\logs\workflow-tests.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run lint
        shell: pwsh
        run: |
          npm run lint 2>&1 | Tee-Object -FilePath package\logs\lint.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run cargo tests
        shell: pwsh
        run: |
          cargo test --locked --manifest-path src-tauri/Cargo.toml --target $env:RUST_TARGET 2>&1 | Tee-Object -FilePath package\logs\cargo-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Render debug tauri config
        shell: pwsh
        run: |
          node scripts/workflow/render-tauri-config.mjs --output package/generated/tauri.verify.conf.json --endpoint "$env:STATIC_UPDATE_BASE_URL/stable/latest.json" --updater-artifacts false

      - name: Build debug validation bundle
        shell: pwsh
        env:
          MSKDSP_UPPER_SOURCEMAP: 'false'
        run: |
          npx tauri build --debug --no-bundle --target $env:RUST_TARGET --ci --config package/generated/tauri.verify.conf.json 2>&1 | Tee-Object -FilePath package\logs\tauri-debug-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: .\scripts\workflow\Show-SccacheStats.ps1

      - name: Collect diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          node scripts/workflow/collect-diagnostics.mjs --channel ci --phase verify --build-log package/logs/tauri-debug-build.log

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: package/diagnostics
          if-no-files-found: ignore

  package-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify-debug
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGET }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: mskdsp-upper-${{ runner.os }}-${{ env.RUST_TARGET }}
          workspaces: |
            ./src-tauri -> target
          cache-bin: 'false'

      - name: Prepare package/log directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package\logs -Force | Out-Null

      - name: Prepare submodule access
        shell: pwsh
        env:
          SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_TOKEN }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: .\scripts\workflow\Prepare-SubmoduleAccess.ps1

      - name: Sync and update submodules
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule status | Tee-Object -FilePath package\logs\git-submodule-status.log

      - name: Install Node dependencies
        shell: pwsh
        run: |
          npm ci 2>&1 | Tee-Object -FilePath package\logs\npm-ci.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Emit build metadata
        id: metadata
        shell: pwsh
        run: |
          node scripts/workflow/emit-build-metadata.mjs --channel ci --repository ${{ github.repository }} --ref ${{ github.ref_name }} --sha ${{ github.sha }} --target-triple $env:RUST_TARGET --platform $env:PLATFORM_ID --output package/metadata/ci.json

      - name: Apply channel version
        id: apply_version
        shell: pwsh
        run: |
          node scripts/workflow/apply-channel-version.mjs --metadata-file package/metadata/ci.json --backup-dir package/.manifest-backup

      - name: Render release tauri config
        shell: pwsh
        run: |
          node scripts/workflow/render-tauri-config.mjs --metadata-file package/metadata/ci.json --output package/generated/tauri.ci.conf.json --endpoint "$env:STATIC_UPDATE_BASE_URL/ci/latest.json" --bundle-targets nsis --updater-artifacts true

      - name: Build release package
        shell: pwsh
        env:
          MSKDSP_UPPER_SOURCEMAP: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build --bundles nsis --target $env:RUST_TARGET --ci --config package/generated/tauri.ci.conf.json 2>&1 | Tee-Object -FilePath package\logs\tauri-release-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: .\scripts\workflow\Show-SccacheStats.ps1

      - name: Stage artifacts
        id: stage
        shell: pwsh
        run: |
          node scripts/workflow/stage-release.mjs --metadata-file package/metadata/ci.json --build-log package/logs/tauri-release-build.log --submodule-status-file package/logs/git-submodule-status.log --asset-base-url "$env:STATIC_UPDATE_BASE_URL/ci/$env:PLATFORM_ID"

      - name: Create delivery bundle
        id: bundle
        shell: pwsh
        run: |
          node scripts/workflow/create-delivery-bundle.mjs --metadata-file package/metadata/ci.json

      - name: Write SHA256 sums
        shell: pwsh
        run: |
          node scripts/workflow/write-sha256sums.mjs --metadata-file package/metadata/ci.json --output-dir ${{ steps.bundle.outputs.output_dir }}

      - name: Sync CI static updater source
        shell: pwsh
        env:
          STATIC_UPDATE_SSH_KEY: ${{ secrets.UPDATE_STATIC_SSH_KEY }}
        run: |
          .\scripts\workflow\Sync-StaticUpdater.ps1 `
            -PackageOutputDir "${{ steps.bundle.outputs.output_dir }}" `
            -ChannelPath ci `
            -Platform "$env:PLATFORM_ID" `
            -BaseUrl "$env:STATIC_UPDATE_BASE_URL" `
            -SshHost "$env:STATIC_UPDATE_SSH_HOST" `
            -SshPort "$env:STATIC_UPDATE_SSH_PORT" `
            -SshUser "$env:STATIC_UPDATE_SSH_USER" `
            -RemoteRoot "$env:STATIC_UPDATE_REMOTE_ROOT"

      - name: Restore manifests
        if: always()
        shell: pwsh
        run: |
          node scripts/workflow/restore-manifests.mjs --backup-dir package/.manifest-backup

      - name: Collect diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          node scripts/workflow/collect-diagnostics.mjs --channel ci --phase package --metadata-file package/metadata/ci.json --build-log package/logs/tauri-release-build.log

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-package-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: package/diagnostics
          if-no-files-found: ignore

      - name: Upload CI package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_base_name }}
          path: ${{ steps.bundle.outputs.output_dir }}
          if-no-files-found: error
